  type: parquet 


Figures:
- name: pm1mu_ProfLogL
  enable: true
  style:
  - gambit_2x1
  - rectcmap
  frame:
    ax:
      labels:
        x: $\mu~({\rm TeV})$
        y: $M_1~({\rm TeV})$
      xlim: [0, 6]
      ylim: [-4, 4]
      text:
      - x: 0.
        y: 1.0016
        s: MSSM7
        ha: left
        va: bottom
        fontfamily: STIXGeneral
        fontsize: xx-small
        transform: true
    axc:
      label:
        ylabel: profile likelihood ratio $\Lambda = \mathcal{L} / \mathcal{L}_{\rm max} $
      color:
        cmap: gambit_cmap
        vmin: 0
        vmax: 1
  layers:
  - name: prof
    data:
    - source: h5
      transform:
      - sortby: LogL1
      # - filter: LogL1 < -258.5
      - profile:
          bin: 150
          coordinates:
            x:
              expr: pMu/1000
              scale: linear
              name: xx
              lim: [0, 6]
            y:
              expr: pM1/1000
              scale: linear
              name: yy
              lim: [-4, 4]
            z:
              expr: LogL1
              scale: linear
              name: z0
          objective: max
          grid_points: rect
    share_data: pm1mu_profile
    axes: ax
    method: voronoi
    coordinates:
      x:
        expr: xx
      y:
        expr: yy
      z:
        expr: np.exp(LogL1) / np.exp(-258.5)
        # expr: np.exp(LogL1) / np.exp(np.max(LogL1))
    style: {}

- name: mN1mC1_ProfLogL
  enable: true
  style:
  - gambit_2x1
  - rectcmap
  frame:
    ax:
      labels:
        x: $m_{\tilde{\chi}_1^0}$ (GeV)
        y: $m_{\tilde{\chi}_1^\pm}$ (GeV)
      xlim: [0, 3500]
      ylim: [0, 7000]
      text:
      - x: 0.
        y: 1.0016
        s: MSSM7
        ha: left
        va: bottom
        fontfamily: STIXGeneral
        fontsize: xx-small
        transform: true
    axc:
      label:
        ylabel: profile likelihood ratio $\Lambda = \mathcal{L} / \mathcal{L}_{\rm max} $
      color:
        cmap: gambit_cmap
        vmin: 0
        vmax: 1
  layers:
  - name: prof
    data:
    - source: h5
      transform:
      - sortby: LogL1
      # - filter: LogL1 < -258.0 
      - profile:
          bin: 150
          coordinates:
            x:
              expr: np.abs(mWIMP)
              scale: linear
              name: xx
              lim: [0, 3500]
            y:
              expr: np.abs(mC1)
              scale: linear
              name: yy
              lim: [0, 7000]
            z:
              expr: LogL1
              scale: linear
              name: z0
          objective: max
          grid_points: rect
    share_data: pm1mu_profile
    axes: ax
    method: voronoi
    coordinates:
      x:
        expr: xx
      y:
        expr: yy
      z:
        expr: np.exp(LogL1) / np.exp(-258.5)
        # expr: np.exp(LogL1) / np.exp(np.max(LogL1))

    style: {}



